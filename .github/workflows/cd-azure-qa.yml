name: CD – Deploy to QA

on:
  push:
    branches:
      - main

env:
  JAVA_VERSION: '21'
  REGISTRY: ghcr.io
  IMAGE_NAME: patrici-a/squirtle-squad-notification-service
  RESOURCE_GROUP: rg-patricia-prod

jobs:

  build-and-push:
    name: "Build & Push Docker Image"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests -B

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:qa-latest

  deploy-qa:
    name: "Deploy to QA"
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to QA Container App
        run: |
          az containerapp update \
            --name patricia-notificati-service-qa \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:qa-latest

      - name: Health check QA
        run: |
          sleep 30
          STATUS=$(az containerapp show \
            --name patricia-notificati-service-qa \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.runningStatus" -o tsv)
          echo "QA status: $STATUS"
          if [ "$STATUS" != "Running" ]; then
            echo "QA health check failed"
            exit 1
          fi