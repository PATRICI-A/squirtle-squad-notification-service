name: CD – Azure App Service Deploy

on:
  push:
    branches:
      - main

env:
  JAVA_VERSION: '21'

jobs:

  deploy:
    name: "Deploy to Azure App Service"
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Grant execute permission to Maven Wrapper
        run: chmod +x mvnw

      - name: Build application
        env:
          SPRING_PROFILES_ACTIVE: prod
          MONGODB_URI:       ${{ secrets.MONGODB_URI }}
          MONGODB_DATABASE:  notification_db
          RABBITMQ_HOST:     ${{ secrets.RABBITMQ_HOST }}
          RABBITMQ_PORT:     5671
          RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          RABBITMQ_VHOST:    ${{ secrets.RABBITMQ_VHOST }}
          RABBITMQ_SSL:      true
          MAIL_USERNAME:     ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD:     ${{ secrets.MAIL_PASSWORD }}
        run: ./mvnw clean package -DskipTests -B

      - name: List generated JAR
        run: ls -la target/*.jar

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure App Service environment variables
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ secrets.AZURE_APP_SERVICE_NAME }}
          app-settings-json: |
            [
              { "name": "MONGODB_URI",       "value": "${{ secrets.MONGODB_URI }}",       "slotSetting": false },
              { "name": "MONGODB_DATABASE",  "value": "notification_db",                  "slotSetting": false },
              { "name": "RABBITMQ_HOST",     "value": "${{ secrets.RABBITMQ_HOST }}",     "slotSetting": false },
              { "name": "RABBITMQ_PORT",     "value": "5671",                             "slotSetting": false },
              { "name": "RABBITMQ_USERNAME", "value": "${{ secrets.RABBITMQ_USERNAME }}", "slotSetting": false },
              { "name": "RABBITMQ_PASSWORD", "value": "${{ secrets.RABBITMQ_PASSWORD }}", "slotSetting": false },
              { "name": "RABBITMQ_VHOST",    "value": "${{ secrets.RABBITMQ_VHOST }}",    "slotSetting": false },
              { "name": "RABBITMQ_SSL",      "value": "true",                             "slotSetting": false },
              { "name": "MAIL_USERNAME",     "value": "${{ secrets.MAIL_USERNAME }}",     "slotSetting": false },
              { "name": "MAIL_PASSWORD",     "value": "${{ secrets.MAIL_PASSWORD }}",     "slotSetting": false },
              { "name": "JAVA_OPTS",         "value": "-Xms256m -Xmx512m",               "slotSetting": false }
            ]

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_SERVICE_NAME }}
          package: target/notification-service-0.0.1-SNAPSHOT.jar