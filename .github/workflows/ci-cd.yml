name: CI/CD – PATRICIA Notification Service

# ─── TRIGGERS ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened ]

env:
  JAVA_VERSION: '21'

# ─── JOBS ─────────────────────────────────────────────────────────────────────
jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 – CI: Compilar y ejecutar todos los tests
  #
  # Ejecuta en PUSH y en PULL REQUEST.
  # Produce tres artefactos: JAR, reporte JaCoCo HTML/XML, Surefire XML.
  # RabbitMQ y MongoDB Atlas son accesibles desde el runner de GitHub Actions.
  # Las conexiones fallidas a RabbitMQ generan warnings pero no fallan los tests.
  # ═══════════════════════════════════════════════════════════════════════════
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. JDK 21 + caché Maven ──────────────────────────────────────────
      - name: Set up JDK 21 with Maven cache
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # ── 3. mvn clean verify ───────────────────────────────────────────────
      # `verify` ejecuta: compile → test (Surefire) → verify (JaCoCo check 85%).
      # Las variables de entorno sobreescriben los valores de application.properties.
      - name: Run mvn clean verify
        env:
          SPRING_RABBITMQ_HOST:     'localhost'
          SPRING_RABBITMQ_PORT:     '5672'
          SPRING_RABBITMQ_USERNAME: 'guest'
          SPRING_RABBITMQ_PASSWORD: 'guest'
          SPRING_MAIL_USERNAME:     'ci-noreply@example.com'
          SPRING_MAIL_PASSWORD:     'dummy-ci-password'
        run: mvn clean verify -B

      # ── 4. Artefacto: reporte de cobertura JaCoCo ─────────────────────────
      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      # ── 5. Artefacto: reportes XML de Surefire ────────────────────────────
      - name: Upload Surefire test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14

      # ── 6. Artefacto: JAR ejecutable ─────────────────────────────────────
      - name: Upload application JAR
        uses: actions/upload-artifact@v4
        with:
          name: notification-service-jar
          path: target/notification-service-*.jar
          retention-days: 14


  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 – Docker: Construir y publicar la imagen de contenedor
  #
  # Solo se ejecuta en PUSH a main (imagen de producción).
  # Publica en GitHub Container Registry (ghcr.io).
  # La caché de BuildKit (type=gha) reutiliza capas entre builds.
  # ═══════════════════════════════════════════════════════════════════════════
  docker-build-push:
    name: "Docker – Build & Push Image"
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry (ghcr.io)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max


  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3 – Deploy: Publicar imagen en Amazon ECR y actualizar AWS Lambda
  #
  # Solo se ejecuta en PUSH a main, después del job docker-build-push.
  #
  # Secrets requeridos en el repositorio:
  #   AWS_ACCESS_KEY_ID       → clave de acceso (AWS Academy: aws_access_key_id)
  #   AWS_SECRET_ACCESS_KEY   → secreto (AWS Academy: aws_secret_access_key)
  #   AWS_SESSION_TOKEN       → token de sesión (obligatorio en AWS Academy)
  #   AWS_REGION              → región AWS, ej: us-east-1
  #   ECR_REPOSITORY          → nombre del repo ECR, ej: notification-service
  #   LAMBDA_FUNCTION_NAME    → nombre de la función Lambda
  #
  # NOTA AWS Academy: las credenciales son temporales (~4h). Actualizar los
  # secrets AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY y AWS_SESSION_TOKEN
  # cada vez que se inicie una nueva sesión de laboratorio.
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-to-aws-lambda:
    name: "Deploy – AWS Lambda"
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # provenance: false es obligatorio para Lambda — evita OCI Image Index
      # que Lambda no soporta. Lambda requiere Docker Image Manifest V2, Schema 2.
      - name: Build and push image to Amazon ECR
        env:
          ECR_REGISTRY:   ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG:      ${{ github.sha }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Update Lambda function image
        env:
          ECR_REGISTRY:   ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG:      ${{ github.sha }}
        run: |
          aws lambda update-function-code \
            --function-name "${{ secrets.LAMBDA_FUNCTION_NAME }}" \
            --image-uri "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated \
            --function-name "${{ secrets.LAMBDA_FUNCTION_NAME }}"

      - name: Show deployed Lambda status
        run: |
          aws lambda get-function \
            --function-name "${{ secrets.LAMBDA_FUNCTION_NAME }}" \
            --query 'Configuration.[FunctionName,LastModified,State,PackageType]' \
            --output table
