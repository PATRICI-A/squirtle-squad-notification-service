name: CI Pipeline

on:
  push:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Linting (Checkstyle / Spotless si está configurado)
        run: ./mvnw checkstyle:check || echo "Linting plugin not yet configured, continuing..."

      - name: Unit Tests
        run: ./mvnw test

      - name: Build and Verify
        run: ./mvnw clean verify -DskipTests

