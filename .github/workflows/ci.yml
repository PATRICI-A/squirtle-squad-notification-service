name: CI – Notification Service

on:
  pull_request:
    branches:
      - develop
      - main
    types:
      - opened
      - synchronize
      - reopened

  push:
    branches:
      - develop

env:
  JAVA_VERSION: '21'

jobs:

  # =========================================================
  # CI – BUILD, TEST & COVERAGE
  # =========================================================
  build-and-test:
    name: "CI – Build & Test"
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests
        env:
          SPRING_PROFILES_ACTIVE: test
          MONGODB_URI: ${{ secrets.MONGODB_URI_TEST }}
          MONGODB_DATABASE: notification_db
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672
          RABBITMQ_USERNAME: guest
          RABBITMQ_PASSWORD: guest
          RABBITMQ_VHOST: /
          RABBITMQ_SSL: false
          MAIL_USERNAME: ci-noreply@example.com
          MAIL_PASSWORD: dummy-ci-password
        run: mvn clean verify -B

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14

  # =========================================================
  # DOCKER VALIDATION
  # =========================================================
  docker-build:
    name: "Docker – Build Validation"
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t notification-service:ci .
